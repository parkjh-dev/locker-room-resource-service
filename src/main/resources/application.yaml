server:
  port: 8082

spring:
  application:
    name: resource-service
  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/locker_room?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: resource-service
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.greatpark.co.kr/realms/locker-room

  h2:
    console:
      enabled: false

aws:
  s3:
    bucket: resource-service-bucket
    region: ap-northeast-2

app:
  cors:
    allowed-origins: http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
